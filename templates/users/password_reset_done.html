{% extends 'base.html' %}

{% block title %}Письмо отправлено{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header">
                <h4 class="card-title mb-0">Письмо отправлено</h4>
            </div>
            <div class="card-body text-center">
                <p>На указанный email отправлена ссылка для восстановления пароля.</p>
                <p>Проверьте вашу почту и следуйте инструкциям в письме.</p>

                <div class="mt-3">
                    <a href="{% url 'users:login' %}" class="btn btn-primary">Вернуться к входу</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
