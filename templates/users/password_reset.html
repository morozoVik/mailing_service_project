{% extends 'base.html' %}

{% block title %}Восстановление пароля{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header">
                <h4 class="card-title mb-0">Восстановление пароля</h4>
            </div>
            <div class="card-body">
                <form method="post">
                    {% csrf_token %}

                    <div class="mb-3">
                        <label for="id_email" class="form-label">Email</label>
                        <input type="email" name="email" class="form-control" id="id_email" required>
                        {% if form.email.errors %}
                            {% for error in form.email.errors %}
                            <div class="text-danger">{{ error }}</div>
                            {% endfor %}
                        {% endif %}
                    </div>

                    <button type="submit" class="btn btn-primary w-100">Отправить ссылку для сброса</button>
                </form>

                <div class="mt-3 text-center">
                    <p><a href="{% url 'users:login' %}">Вернуться к входу</a></p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
