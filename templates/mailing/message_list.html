{% extends 'base.html' %}

{% block title %}Сообщения{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h1>Сообщения</h1>
    <a href="{% url 'mailing:message_create' %}" class="btn btn-primary">Создать сообщение</a>
</div>

<div class="table-responsive">
    <table class="table table-striped">
        <thead>
            <tr>
                <th>Тема</th>
                <th>Действия</th>
            </tr>
        </thead>
        <tbody>
            {% for message in messages %}
            <tr>
                <td>{{ message.subject }}</td>
                <td>
                    <div class="btn-group btn-group-sm">
                        <a href="{% url 'mailing:message_update' message.pk %}" class="btn btn-outline-primary">✏️</a>
                        <a href="{% url 'mailing:message_delete' message.pk %}" class="btn btn-outline-danger">🗑️</a>
                    </div>
                </td>
            </tr>
            {% empty %}
            <tr>
                <td colspan="2" class="text-center">Нет сообщений</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
