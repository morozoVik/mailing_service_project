{% extends 'base.html' %}

{% block title %}Отправка рассылки{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header">
                <h4 class="card-title mb-0">Подтверждение отправки</h4>
            </div>
            <div class="card-body">
                <p>Вы уверены, что хотите отправить рассылку <strong>"{{ mailing.message.subject }}"</strong>?</p>
                <p>Получателей: <strong>{{ mailing.clients.count }}</strong></p>

                <form method="post">
                    {% csrf_token %}
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-success">Да, отправить</button>
                        <a href="{% url 'mailing:mailing_list' %}" class="btn btn-secondary">Отмена</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
